<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Solicitação TEF | ACS Automação</title>
    <style>
        .checkbox-card:checked+label {
            border-color: #2563eb !important;
            background-color: #eff6ff !important;
            color: #1e40af !important;
        }

        .logic-field {
            transition: all 0.3s ease-in-out;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
        }

        .checkbox-card:checked~.logic-field {
            max-height: 400px;
            opacity: 1;
            margin-top: 10px;
        }

        .digit-counter {
            font-size: 10px;
            font-weight: bold;
            margin-top: 2px;
            margin-bottom: 8px;
        }

        .valid-digit {
            color: #10b981;
        }

        .invalid-digit {
            color: #ef4444;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">

        <!-- Cabeçalho -->
        <div
            class="bg-gradient-to-r from-blue-700 to-indigo-800 p-6 md:p-8 text-white flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-8">
            <div class="flex-shrink-0">
                <!--
<img src="logo.jpg" 
     onerror="this.src='logo.jpg.png'; this.onerror=null;"
     alt="ACS Automação">

  class="h-20 md:h-24 w-auto object-contain block rounded-lg shadow-md">-->
            </div>
            <div class="text-center md:text-left">
                <h2 class="text-3xl font-extrabold tracking-tight">Solicitação de Implantação TEF</h2>
                <p class="text-blue-100 mt-1 text-sm md:text-base font-medium uppercase tracking-widest opacity-90">ACS
                    Automação Comercial e Sistemas</p>
            </div>
        </div>

        <form id="tefForm" class="p-8 space-y-10">

            <!-- 1. Dados da Empresa -->
            <section>
                <div class="flex items-center space-x-2 mb-6 border-b border-gray-100 pb-2">
                    <span
                        class="bg-blue-600 text-white rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold shadow">1</span>
                    <h3 class="text-xl font-bold text-gray-800">Dados da Empresa</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-400 uppercase">CNPJ</label>
                        <input type="text" id="cnpj" placeholder="00.000.000/0000-00" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-400 uppercase">Razão Social</label>
                        <input type="text" id="razaoSocial" placeholder="Nome da Empresa" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-400 uppercase">Nome do Responsável</label>
                        <input type="text" id="responsavel" placeholder="Quem acompanhará a instalação?" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-gray-400 uppercase">WhatsApp / Celular</label>
                            <input type="text" id="telefone" placeholder="(00) 00000-0000" required
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-300 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-gray-400 uppercase">E-mail para Contato</label>
                            <input type="email" id="email" placeholder="email@empresa.com.br" required
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-300 outline-none">
                        </div>
                    </div>
                </div>
            </section>

            <!-- 2. Administradoras -->
            <section>
                <div class="flex items-center space-x-2 mb-6 border-b border-gray-100 pb-2">
                    <span
                        class="bg-blue-600 text-white rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold shadow">2</span>
                    <h3 class="text-xl font-bold text-gray-800">Administradoras (Adquirentes)</h3>
                </div>
                <div id="container-admins" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <!-- 3. Bandeiras e Vouchers -->
            <section>
                <div class="flex items-center space-x-2 mb-6 border-b border-gray-100 pb-2">
                    <span
                        class="bg-blue-600 text-white rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold shadow">3</span>
                    <h3 class="text-xl font-bold text-gray-800">Bandeiras e Vouchers</h3>
                </div>
                <!-- Grid ajustado para suportar muitos itens -->
                <div id="container-bandeiras"
                    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2 text-center"></div>
            </section>

            <!-- Botão Centralizado -->
            <div class="flex justify-center pt-6 border-t border-gray-100">
                <button type="submit"
                    class="w-full md:w-80 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-base uppercase tracking-wider">
                    Enviar Solicitação
                </button>
            </div>
        </form>
    </div>

    <script>
        const adquirentesConfig = [
    { nome: "Redecard", campos: [{ label: "Número Lógico", digitos: 15 }] },
    { nome: "Cielo", campos: [{ label: "Terminal Lógico", digitos: 8 }] },
    { nome: "Stone", campos: [{ label: "Cód. Estabelecimento", digitos: 32 }, { label: "Stonecode", digitos: 9 }] },
    { nome: "Vero", campos: [{ label: "Cód. Estabelecimento", digitos: 15 }, { label: "Código de Rede", digitos: 11 }] },
    { nome: "Bin", campos: [{ label: "Cód. Estabelecimento", digitos: 15 }, { label: "Terminal Virtual", digitos: 8 }] },
    { nome: "Sipag", campos: [{ label: "Cód. Estabelecimento", digitos: 15 }, { label: "Terminal Virtual", digitos: 8 }] },
    { nome: "Tricard", campos: [{ label: "Cód. Estabelecimento", digitos: 15 }] },
    { nome: "Safrapay", campos: [{ label: "Terminal Lógico", digitos: 8 }, { label: "Cód. Estabelecimento", digitos: 15 }] },
    { nome: "Pagseguro", campos: [{ label: "Cód. Estabelecimento", digitos: 15 }] },
    { nome: "Getnet Frota", campos: [{ label: "Cód. Estabelecimento", digitos: 15 }, { label: "CEP", digitos: 5 }] },
    { nome: "Getnet Convencionais", campos: [{ label: "Cód. Estabelecimento", digitos: 15 }, { label: "Terminal Lógico", digitos: 8 }] }
];

const listaBandeiras = [
    "Mastercard credito", "Mastercard débito", "Master Voucher", "Elo Credito", "Elo Debito",
    "Hiper crédito", "Hiper débito", "American Express (Amex)", "Visa crédito", "Visa débito",
    "Ticket", "Visa Vale", "Alelo", "Sodexo", "VR", "Ben Visa Vale", "008 Cards Credito",
    "008 Cards Debito", "Abrapetite Voucher", "ACCredito Credito", "ACCredito Debito",
    "Agiplan Credito", "Agiplan Debito", "ASMUBE Credito", "ASMUBE Debito", "Aura Credito",
    "Avancard Credito", "Avancard Debito", "Avista", "Bamex Voucher", "Banescard Credito",
    "Banescard Debito", "Banesecard Credito", "Banesecard Debito", "Banesecard Voucher",
    "Banquet", "BanriCard Private Label", "BanriCard Voucher", "Banrisul Credito",
    "Banrisul Debito", "Bigcard", "Bigcard Voucher", "Biq Beneficios", "BNBClube Credito",
    "BNBClube Debito", "BNBClube Voucher", "Bonus CBA", "Bracov Credito", "Bracov Debito",
    "Cabal Credito", "Cabal Debito", "Cabal Voucher", "Calcard", "Card Ideal Credito",
    "Cartao do Comercio Debito", "CDC Card Credito", "CDC Card Debito", "Cetelem",
    "Consolidar Credito", "Consolidar Debito", "Coopercred", "Coopercred Credito",
    "Credex Credito", "Credex Debito", "Credpar", "CredSystem(Mais)", "CredZ",
    "Dinners Credito", "Discover Credito", "Eucard Credito", "Eucard Debito",
    "Eucard Voucher", "Fininvest", "FortBrasil", "Goodcard Credito", "Goodcard Debito",
    "Goodcard Voucher", "GrandCard Credito", "GrandCard Debito", "Greencard",
    "ItaCard Credito", "ItaCard Debito", "JCB Credito", "Libercard Credito",
    "Libercard Debito", "Maxxcard Credito", "Maxxcard Debito", "Maxxcard Voucher",
    "MaxxVan Credito", "MaxxVan Debito", "Megavale Card Credito", "Megavale Card Debito",
    "Nutricash", "PAAN Debito", "Personal Card Credito", "Personal Card Debito",
    "Personal Card Frota", "Personal Card Voucher", "Planvale", "PLMaster GetNetLac",
    "PLVisa GetNetLac", "Policard Credito", "Policard Debito", "Policard Voucher",
    "RedeCompras Credito", "RedeCompras Debito", "Redemed Credito", "Sapore",
    "Senff Credito", "Senff Voucher", "Sicredi Credito", "Sicredi Debito", "Sindcred",
    "Sorocred Credito", "Sorocred Debito", "Sorocred Voucher", "TrioCard Credito",
    "TrioCard Debito", "UPI Credito", "Valecard Credito", "Valecard Debito",
    "Valecard Voucher", "Valefacil", "Valefrota", "Valemulti", "Verdecard",
    "Verdecard Debito", "Verocheque Credito", "Verocheque Voucher", "Volus Credito",
    "Volus Debito", "Volus Voucher", "VSCard", "Outros Cartões"
];

function init() {
    const adminContainer = document.getElementById('container-admins');
    adquirentesConfig.forEach((adm, idx) => {
        let inputsHTML = '';
        adm.campos.forEach((campo) => {
            inputsHTML += `
                <div class="mt-3">
                    <label class="text-[10px] font-bold text-blue-600 uppercase block ml-1">${campo.label}</label>
                    <input type="text" maxlength="${campo.digitos}" oninput="validateInput(this, ${campo.digitos})"
                        data-label="${campo.label}"
                        class="logic-input w-full px-3 py-2 bg-white border border-blue-200 rounded-lg text-sm outline-none shadow-sm focus:border-blue-500">
                    <div class="digit-counter invalid-digit">Requerido: ${campo.digitos} dig. (0)</div>
                </div>`;
        });

        adminContainer.innerHTML += `
            <div class="flex flex-col">
                <input type="checkbox" id="adm_${idx}" class="peer hidden checkbox-card adm-checkbox" data-nome="${adm.nome}">
                <label for="adm_${idx}" class="w-full text-center py-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-blue-400 font-bold text-gray-700 uppercase text-xs transition-all">
                    ${adm.nome}
                </label>
                <div class="logic-field px-1">${inputsHTML}</div>
            </div>`;
    });

    const bandContainer = document.getElementById('container-bandeiras');
    listaBandeiras.forEach((b, i) => {
        bandContainer.innerHTML += `
            <div class="relative flex">
                <input type="checkbox" id="band_${i}" class="peer hidden checkbox-card band-checkbox" data-bandeira="${b}">
                <label for="band_${i}" class="w-full block py-2 border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 text-[9px] font-bold text-gray-600 uppercase transition-all leading-tight flex items-center justify-center min-h-[44px] px-1">
                    ${b}
                </label>
            </div>`;
    });
}

function validateInput(el, required) {
    el.value = el.value.replace(/\D/g, '');
    const count = el.value.length;
    const counter = el.nextElementSibling;
    if (count === required) {
        counter.className = 'digit-counter valid-digit';
        counter.innerText = `✓ OK: ${count} dígitos`;
    } else {
        counter.className = 'digit-counter invalid-digit';
        counter.innerText = `Requerido: ${required} dig. (${count})`;
    }
}

init();

// --- LÓGICA DE ENVIO PARA O RENDER ---
document.getElementById('tefForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    // 1. Mostrar carregamento
    Swal.fire({
        title: 'Enviando...',
        text: 'Por favor, aguarde enquanto processamos sua solicitação no Movidesk.',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading() }
    });

    // 2. Coletar Administradoras selecionadas e seus campos lógicos
    let admins = [];
    document.querySelectorAll('.adm-checkbox:checked').forEach(cb => {
        let admNome = cb.getAttribute('data-nome');
        let campos = {};
        cb.parentElement.querySelectorAll('.logic-input').forEach(input => {
            campos[input.getAttribute('data-label')] = input.value;
        });
        admins.push({ nome: admNome, campos: campos });
    });

    // 3. Coletar Bandeiras selecionadas
    let bandeiras = [];
    document.querySelectorAll('.band-checkbox:checked').forEach(cb => {
        bandeiras.push(cb.getAttribute('data-bandeira'));
    });

    // 4. Montar o objeto de dados (JSON)
    const dados = {
        razaoSocial: document.getElementById('razaoSocial').value,
        cnpj: document.getElementById('cnpj').value,
        responsavel: document.getElementById('responsavel').value,
        telefone: document.getElementById('telefone').value,
        email: document.getElementById('email').value,
        administradoras: admins,
        bandeiras: bandeiras
    };

    try {
        // --- TROQUE A URL ABAIXO PELA SUA URL DO RENDER ---
        const response = await fetch('/api/enviar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        const resultado = await response.json();

        if (response.ok) {
            Swal.fire({
                title: 'Sucesso!',
                text: `Ticket ${resultado.protocolo} criado com sucesso!`,
                icon: 'success',
                confirmButtonColor: '#2563eb'
            });
            document.getElementById('tefForm').reset();
            // Resetar contadores visuais
            document.querySelectorAll('.digit-counter').forEach(c => c.innerText = "Requerido: 0 dig.");
        } else {
            throw new Error(resultado.error || 'Erro ao criar ticket');
        }
    } catch (error) {
        Swal.fire({
            title: 'Erro!',
            text: 'Não foi possível conectar ao servidor. Verifique se o Render está ativo.',
            icon: 'error',
            confirmButtonColor: '#ef4444'
        });
    }
});
    </script>
</body>

</html>
